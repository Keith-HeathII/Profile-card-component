<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Profile card component</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@100..900&family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@100..900&family=Kumbh+Sans:wght@100..900&family=Lexend+Deca:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <img class="top-card" src="images/bg-pattern-card.svg">
    <section class="user">
     <img class="profile-picture" src="images/image-victor.jpg">
     <span class="users-name">
      <h2>Victor Crest <span>26</span></h2> 
      <p>London</p>
    </span>
      <section class="user-stats">
        <div>
         <h2>80K</h2>
         <p>Followers</p>
       </div>
       <div>
         <h2>803K</h2>
         <p>Likes</p>
       </div>
       <div>
         <h2>1.4k</h2>
         <p>Photos</p>
       </div>
     </section>
  </section>
  </div>
</main>
</body>
</html>
