<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Profile card component</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Inline:opsz,wght@10..72,100..900&family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kumbh+Sans:wght@100..900&family=Lexend+Deca:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="profile-card-component">
    <img class="profile-card-top" src="images/bg-pattern-card.svg">
  <div id="profile-card">
    <img class="profile-picture" src="images/image-victor.jpg" alt="profile picture">
    <h3 class="name-age">Victor Crest<span class="thin">26</span></h3>
   <h3 class=" country thin">London</h3>
   <hr>
   <div class="profile-stats">
    <div>
      <h3>80K</h3>
      <p class="thin">Followers</p>
    </div>
    <div>
      <h3>803K</h3>
      <p class="thin">Likes</p>
    </div>
    <div>
      <h3>1.4</h3>
      <p class="thin">Photos</p>
    </div>
   </div>
  </div>
</div>
</body>
</html>
