<head>
  <meta charset="UTF-8">

<body>
<div class="profile-card">
  <img class="profile-card-top" src="images/bg-pattern-card.svg">
  <div class="profile-info">
    <img class="profile-picture" src="images/image-victor.jpg">
    <h3>Victor Crest <span>26</span></h3>
    <h4>London</h4>
    <hr>
   <div class="profile-stats">
      <p><strong>80k</strong></br> Followers</p>
      <p><strong>803k</strong><br> Likes</p>
      <p><strong>1.4k</strong><br> Photos</p>
   </div>
  </div>
</div>
